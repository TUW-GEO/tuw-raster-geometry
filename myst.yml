version: 1

extends:
  - https://github.com/TUW-GEO/cookiecutter-docs-config/raw/main/myst.yml

project:
  title: tuw-raster-geometry
  authors:
    - name: TU Wien GEO RS Group
  source_url: https://example.com
  edit_url: https://example.com
  open_access: true
  toc:
    - file: README.md
    - title: "API"
      children:
        - file: docs/index.ipynb
    - title: "Developing"
      children:
        - file: CONTRIBUTING.md
  error_rules:
    - rule: image-downloads
      severity: ignore
    - rule: image-format-converts
      severity: ignore
    - rule: link-resolves
      severity: ignore
      keys: [] # List links here that will not be checked if they exist
