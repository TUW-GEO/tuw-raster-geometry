stages:
  - build
  - test
  - deploy

.test-template:
  stage: test
  image: swamydev/geo-python:3.12-slim-bookworm
  coverage: '/^TOTAL.+?(\d+\%)$/'
  tags:
    - python

test-main:
  extends: .test-template
  script:
    - uv sync --dev
    - uv run pytest tests
  rules:
    - if: '$CI_COMMIT_TAG == null'
      when: always

test-release:
  extends: .test-template
  script:
    - uv sync --no-sources --no-install-package gdal && uv pip install gdal=="$(shell gdal-config --version).*"
    - uv run pytest tests/ -rsx --verbose --color=yes --cov=tuw_raster_geometry --cov-report term-missing --junitxml ./ci-test-results.xml
    - coverage json
  rules:
    - if: '$CI_COMMIT_TAG'
      when: always

deploy-pypi:
  stage: deploy
  image: python:latest
  needs:
    - test-release
  script:
    - uv build
    - TWINE_PASSWORD=${CI_JOB_TOKEN} TWINE_USERNAME=gitlab-ci-token python -m twine upload --repository-url ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi dist/*
  rules:
    - if: $CI_COMMIT_TAG
      when: on_success
  tags:
    - python


